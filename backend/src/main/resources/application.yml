spring:
  application:
    name: opsdesk

  datasource:
    url: jdbc:postgresql://localhost:5433/opsdesk
    username: opsdesk
    password: opsdesk
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

opsdesk:
  security:
    jwt:
      secret: ${OPSDESK_JWT_SECRET:dev-only-change-this-jwt-secret-for-opsdesk}
      expiration: PT2H
