name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: opsdesk_test
          POSTGRES_USER: opsdesk
          POSTGRES_PASSWORD: opsdesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opsdesk -d opsdesk_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/opsdesk_test
      SPRING_DATASOURCE_USERNAME: opsdesk
      SPRING_DATASOURCE_PASSWORD: opsdesk
      OPSDESK_JWT_SECRET: ci-test-secret-ci-test-secret-ci-test-secret
      OPSDESK_DEMO_DATA_ENABLED: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run backend tests
        run: mvn test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build